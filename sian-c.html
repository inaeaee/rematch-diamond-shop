<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>시안 C · 비비드 플레이풀</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
:root{
  --pink:#FF2D78; --pink-deep:#E0005A; --purple:#9840DF; --gold:#FFCB2D; --coral:#FF7A59;
  --ink:#2B1A3D; --g5:#9B8AAE; --g4:#C5B8D4;
  --bg:#FFF4FA;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:#F2D9E8;}
body{width:360px;margin:0 auto;background:var(--bg);font-family:'Pretendard',sans-serif;color:var(--ink);letter-spacing:-0.3px;-webkit-font-smoothing:antialiased;overflow-x:hidden;background-image:radial-gradient(circle at 0% 0%,rgba(255,203,45,.15),transparent 30%),radial-gradient(circle at 100% 20%,rgba(152,64,223,.12),transparent 35%);}
.tag{position:sticky;top:0;z-index:101;background:#fff;text-align:center;font-size:11px;font-weight:700;color:var(--purple);padding:6px;}
.hdr{position:sticky;top:29px;z-index:100;width:360px;height:56px;background:rgba(255,244,250,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;}
.hdr-logo{font-size:22px;font-weight:800;letter-spacing:-0.6px;background:linear-gradient(120deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.hdr-logo em{font-style:italic;}
.hero-wrap{padding:10px 14px 0;}
.hero{background:linear-gradient(125deg,#FF2D78,#9840DF 70%,#6A2FD0);border-radius:26px;padding:22px;display:flex;align-items:flex-end;justify-content:space-between;min-height:124px;overflow:hidden;box-shadow:0 12px 30px rgba(255,45,120,.32);}
.hero-tag{font-size:12px;color:rgba(255,255,255,.85);margin-bottom:9px;font-weight:600;}
.hero-cta{display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--pink);border:none;border-radius:999px;padding:12px 20px;font-size:13.5px;font-weight:800;box-shadow:0 6px 18px rgba(0,0,0,.15);}
.hero-gem{font-size:46px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));}
.tabs{width:332px;margin:18px 14px 6px;display:flex;gap:8px;}
.tab-btn{flex:1;height:46px;border:none;background:#fff;font-family:inherit;font-size:14.5px;font-weight:700;color:var(--g5);border-radius:16px;box-shadow:0 3px 10px rgba(255,45,120,.08);}
.tab-btn.on{background:linear-gradient(120deg,var(--pink),var(--purple));color:#fff;box-shadow:0 6px 16px rgba(255,45,120,.35);}
.memb{width:332px;margin:12px 14px;display:flex;align-items:center;gap:10px;padding:16px 18px;background:linear-gradient(120deg,#FFE9B8,#FFD3E6);border:none;border-radius:20px;box-shadow:0 6px 16px rgba(255,150,50,.18);}
.memb-txt{flex:1;font-size:14px;font-weight:700;color:var(--ink);}.memb-txt em{color:var(--pink-deep);font-style:normal;font-weight:900;}
.first{display:flex;align-items:center;justify-content:center;gap:8px;width:332px;margin:0 14px 10px;background:linear-gradient(120deg,var(--coral),var(--gold));border:none;border-radius:20px;height:56px;font-family:inherit;font-size:15px;font-weight:800;color:#fff;box-shadow:0 8px 20px rgba(255,122,89,.35);}
.first em{color:#fff;font-style:normal;font-weight:900;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:999px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:8px 14px 16px;}
.card{position:relative;background:#fff;border:3px solid transparent;border-radius:24px;box-shadow:0 8px 20px rgba(255,45,120,.1);overflow:hidden;padding:0;font-family:inherit;width:100%;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,border-color .15s;}
.card:active{transform:scale(.96);}
.card.sel{border-color:var(--pink);box-shadow:0 14px 30px rgba(255,45,120,.35);transform:translateY(-5px) scale(1.02);}
.mark{position:absolute;top:12px;right:12px;width:28px;height:28px;background:linear-gradient(120deg,var(--pink),var(--purple));border-radius:999px;display:none;align-items:center;justify-content:center;color:#fff;font-weight:900;box-shadow:0 4px 12px rgba(255,45,120,.5);}
.card.sel .mark{display:flex;}
.badge{position:absolute;top:12px;left:12px;border-radius:999px;font-size:10px;font-weight:800;color:#fff;padding:5px 11px;background:linear-gradient(120deg,var(--coral),var(--gold));box-shadow:0 4px 10px rgba(255,122,89,.4);}
.img{width:100%;aspect-ratio:1/0.72;display:flex;align-items:center;justify-content:center;font-size:44px;background:linear-gradient(150deg,#FFE6F2,#F3E6FF);}
.top{padding:16px 12px 10px;text-align:center;}
.qty{font-size:18px;font-weight:900;}.sub{font-size:11px;font-weight:500;color:var(--g5);margin-top:4px;}
.total{margin:0 12px 10px;background:linear-gradient(120deg,#FFE6F0,#F3E6FF);border-radius:14px;padding:8px;text-align:center;}
.total-l{font-size:9.5px;color:var(--g5);}.total-v{font-size:14px;font-weight:900;color:var(--pink);margin-top:3px;}
.price-row{padding:0 12px 18px;text-align:center;}
.price{font-size:19px;font-weight:900;}.unit{font-size:10px;color:var(--g4);margin-top:3px;}
.sticky{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:360px;padding:0 14px 16px;}
.sticky::before{content:'';position:absolute;left:0;right:0;top:-28px;height:28px;background:linear-gradient(to top,var(--bg) 20%,transparent);}
.scard{background:#fff;border-radius:24px;box-shadow:0 -8px 28px rgba(255,45,120,.14);padding:16px 18px 18px;}
.safe{text-align:center;font-size:10.5px;color:var(--g5);margin-bottom:10px;}
.summ{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;min-height:24px;}
.sname{font-size:13px;font-weight:700;color:var(--g5);}.sprice{font-size:24px;font-weight:900;}.sprice.empty{font-size:13px;color:var(--g4);}
.pay{width:100%;height:58px;background:linear-gradient(120deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:20px;font-family:inherit;font-size:17px;font-weight:900;box-shadow:0 10px 24px rgba(255,45,120,.4);}
.pay.dis{background:#EDE2F0;color:var(--g4);box-shadow:none;}
.spacer{height:170px;}
</style></head>
<body>
<div class="tag">시안 C · 비비드 플레이풀 (당근/캔디)</div>
<header class="hdr"><div class="hdr-logo"><em>R</em>ematch</div></header>
<div class="hero-wrap"><div class="hero"><div><p class="hero-tag">리매치 이용방법</p><button class="hero-cta">초보자 가이드 보기 👆</button></div><span class="hero-gem">💎</span></div></div>
<div class="tabs"><button class="tab-btn on">다이아</button><button class="tab-btn">어워드티켓</button></div>
<button class="memb"><span>🌸</span><span class="memb-txt">로얄 멤버십 가입 시 <em>15%</em> 할인!</span><span>›</span></button>
<button class="first">🎁 첫 구매 시 추가 다이아 <em>2배</em> 증정!</button>
<div class="grid">
<button class="card" onclick="pick(this,'다이아 150개','₩1,080','총 300개')"><span class="mark">✓</span><span class="badge">첫 구매 2배</span><div class="img">💝</div><div class="top"><div class="qty">💎 150개</div><div class="sub">기본 150 + 보너스 150</div></div><div class="total"><div class="total-l">실제 받는 다이아</div><div class="total-v">💎 300개</div></div><div class="price-row"><div class="price">₩1,080</div><div class="unit">개당 약 3.6원</div></div></button>
<button class="card" onclick="pick(this,'다이아 850개','₩5,300','총 1,700개')"><span class="mark">✓</span><span class="badge">첫 구매 2배</span><div class="img">💝</div><div class="top"><div class="qty">💎 850개</div><div class="sub">기본 850 + 보너스 850</div></div><div class="total"><div class="total-l">실제 받는 다이아</div><div class="total-v">💎 1,700개</div></div><div class="price-row"><div class="price">₩5,300</div><div class="unit">개당 약 3.1원</div></div></button>
<button class="card" onclick="pick(this,'다이아 2,600개','₩13,400','총 5,200개')"><span class="mark">✓</span><span class="badge">첫 구매 2배</span><div class="img">🎁</div><div class="top"><div class="qty">💎 2,600개</div><div class="sub">기본 2,600 + 보너스 2,600</div></div><div class="total"><div class="total-l">실제 받는 다이아</div><div class="total-v">💎 5,200개</div></div><div class="price-row"><div class="price">₩13,400</div><div class="unit">개당 약 2.6원</div></div></button>
<button class="card" onclick="pick(this,'다이아 12,500개','₩52,000','총 25,000개')"><span class="mark">✓</span><span class="badge">첫 구매 2배</span><div class="img">🎁</div><div class="top"><div class="qty">💎 12,500개</div><div class="sub">기본 12,500 + 보너스 12,500</div></div><div class="total"><div class="total-l">실제 받는 다이아</div><div class="total-v">💎 25,000개</div></div><div class="price-row"><div class="price">₩52,000</div><div class="unit">개당 약 2.1원</div></div></button>
<button class="card" onclick="pick(this,'다이아 32,000개','₩98,000','총 64,000개')"><span class="mark">✓</span><span class="badge">첫 구매 2배</span><div class="img">🧳</div><div class="top"><div class="qty">💎 32,000개</div><div class="sub">기본 32,000 + 보너스 32,000</div></div><div class="total"><div class="total-l">실제 받는 다이아</div><div class="total-v">💎 64,000개</div></div><div class="price-row"><div class="price">₩98,000</div><div class="unit">개당 약 1.5원</div></div></button>
<button class="card" onclick="pick(this,'다이아 68,000개','₩197,000','총 136,000개')"><span class="mark">✓</span><span class="badge">첫 구매 2배</span><div class="img">🧳</div><div class="top"><div class="qty">💎 68,000개</div><div class="sub">기본 68,000 + 보너스 68,000</div></div><div class="total"><div class="total-l">실제 받는 다이아</div><div class="total-v">💎 136,000개</div></div><div class="price-row"><div class="price">₩197,000</div><div class="unit">개당 약 1.4원</div></div></button>
</div>
<div class="spacer"></div>
<div class="sticky"><div class="scard"><div class="safe">🔒 결제 정보는 안전하게 암호화되어 처리돼요</div><div class="summ"><div class="sname" id="n">선택한 상품</div><div class="sprice empty" id="p">상품을 선택해 주세요</div></div><button class="pay dis" id="b" onclick="buy()">결제하기</button></div></div>
<script>
var cur=null;
function pick(c,name,price,total){if(cur)cur.classList.remove('sel');c.classList.add('sel');cur=c;document.getElementById('n').textContent=name+' · '+total;var p=document.getElementById('p');p.textContent=price;p.classList.remove('empty');document.getElementById('b').classList.remove('dis');}
function buy(){if(!cur){alert('상품을 먼저 선택해 주세요');return;}alert('결제 페이지로 이동합니다.');}
</script>
</body></html>
