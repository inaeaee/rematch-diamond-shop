<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>리매치 상점 · 3가지 UI 시안</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:#0E0A1A;color:#fff;padding:40px 20px 80px;min-height:100vh;
background-image:radial-gradient(circle at 20% 0%,rgba(152,64,223,.25),transparent 40%),radial-gradient(circle at 90% 10%,rgba(255,45,120,.2),transparent 35%);}
h1{font-size:26px;font-weight:800;text-align:center;letter-spacing:-0.6px;}
.sub{text-align:center;color:#B9AED4;font-size:14px;margin:10px 0 40px;}
.row{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;max-width:1200px;margin:0 auto;}
.col{background:rgba(28,21,48,.6);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:20px;width:340px;}
.col h2{font-size:18px;font-weight:800;margin-bottom:4px;}
.col p{font-size:13px;color:#B9AED4;margin-bottom:16px;line-height:1.5;}
.frame{width:300px;height:520px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.1);margin:0 auto 16px;background:#fff;}
iframe{width:360px;height:624px;border:0;transform:scale(.8333);transform-origin:top left;}
.btn{display:block;text-align:center;background:linear-gradient(120deg,#FF2D78,#9840DF);color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:13px;border-radius:14px;}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;margin-bottom:10px;}
.t-a{background:rgba(255,255,255,.12);color:#fff;}
.t-b{background:rgba(255,45,120,.2);color:#FF5C9A;}
.t-c{background:rgba(255,203,45,.2);color:#FFCB2D;}
</style></head>
<body>
<h1>리매치 상점 · 3가지 UI 시안</h1>
<p class="sub">동일한 콘텐츠·브랜드 컬러, 서로 다른 디자인 방향</p>
<div class="row">
  <div class="col">
    <span class="tag t-a">A</span>
    <h2>클린 미니멀</h2>
    <p>토스풍. 화이트 베이스 · 절제된 그림자 · 넉넉한 여백. 가장 신뢰감 있고 깔끔.</p>
    <div class="frame"><iframe src="sian-a.html"></iframe></div>
    <a class="btn" href="sian-a.html">전체 화면으로 보기 →</a>
  </div>
  <div class="col">
    <span class="tag t-b">B</span>
    <h2>다크 프리미엄</h2>
    <p>네온/게이밍. 다크 배경 + 핑크·퍼플 글로우 · 글래스모피즘. 고급스럽고 몰입감.</p>
    <div class="frame"><iframe src="sian-b.html"></iframe></div>
    <a class="btn" href="sian-b.html">전체 화면으로 보기 →</a>
  </div>
  <div class="col">
    <span class="tag t-c">C</span>
    <h2>비비드 플레이풀</h2>
    <p>당근/캔디. 컬러풀 그라데이션 · 큰 라운드 · 통통 튀는 인터랙션. 친근하고 활기참.</p>
    <div class="frame"><iframe src="sian-c.html"></iframe></div>
    <a class="btn" href="sian-c.html">전체 화면으로 보기 →</a>
  </div>
</div>
</body></html>
